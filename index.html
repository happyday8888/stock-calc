<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股交易損益試算器</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .profit-red { color: #d63939; font-weight: bold; }
        .loss-green { color: #2d8a3c; font-weight: bold; }
        .table-container { overflow-x: auto; }
        #save-toast { transition: opacity 0.5s; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8 text-slate-700">

    <div class="max-w-7xl mx-auto">
        <header class="bg-slate-800 text-white p-4 rounded-lg shadow-md mb-6 flex justify-between items-center">
            <h1 class="text-xl font-bold">📊 股票交易試算器</h1>
            <div class="flex items-center gap-4">
                <span id="save-toast" class="text-xs bg-green-500 text-white px-2 py-1 rounded">設定已自動儲存</span>
                <span class="text-xs opacity-60">PWA 模式已啟動</span>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-80 flex-shrink-0">
                <div class="bg-white p-6 shadow-md rounded-xl border-t-4 border-blue-500 sticky top-8">
                    <h2 class="font-bold text-gray-700 mb-6 border-l-4 border-blue-500 pl-2 text-lg">交易參數</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">交易類別</label>
                            <select id="tradeType" class="w-full border-2 border-blue-100 p-2 rounded mt-1 bg-white outline-none focus:border-blue-400">
                                <option value="stock">股票</option>
                                <option value="dayTrade">股票當沖</option>
                                <option value="etf">ETF</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">買入價格 (元)</label>
                            <input type="number" id="buyPrice" placeholder="請輸入成交價" class="w-full border-2 border-blue-100 p-2 rounded mt-1 outline-none focus:border-blue-400 transition bg-blue-50/30">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-orange-600 uppercase">自定義賣出價 (元)</label>
                            <input type="number" id="targetSellPrice" placeholder="輸入特定價位" class="w-full border-2 border-orange-100 p-2 rounded mt-1 outline-none focus:border-orange-400 bg-orange-50 transition">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">交易股數 (股)</label>
                            <input type="number" id="buyShares" value="1000" class="w-full border-2 border-gray-100 p-2 rounded mt-1 outline-none focus:border-blue-400 transition">
                        </div>
                        
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 mb-2">券商設定 (自動記憶)</p>
                            <div class="grid grid-cols-2 gap-2 text-[10px]">
                                <div>
                                    <label class="font-bold text-gray-500 uppercase">手續費折扣 (折)</label>
                                    <input type="number" id="discount" value="6" step="0.1" placeholder="例如: 2.8" class="w-full border border-gray-200 p-2 rounded mt-1 bg-white focus:border-blue-400 outline-none">
                                </div>
                                <div>
                                    <label class="font-bold text-gray-500 uppercase">最低收費 (元)</label>
                                    <input type="number" id="minFee" value="20" class="w-full border border-gray-200 p-2 rounded mt-1 bg-white focus:border-blue-400 outline-none">
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-gray-500 uppercase">手續費計法</label>
                            <select id="feeMethod" class="w-full border border-gray-200 p-2 rounded mt-1 bg-white outline-none focus:border-blue-400">
                                <option value="floor" selected>無條件捨去</option>
                                <option value="round">四捨五入</option>
                            </select>
                        </div>
                        <div class="pt-4 border-t border-gray-100">
                            <button onclick="clearStorage()" class="w-full py-2 text-xs text-gray-400 hover:text-red-500 transition">恢復系統預設值</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-grow">
                <div class="bg-white shadow-md rounded-xl border border-gray-200 table-container">
                    <table class="w-full text-center text-sm min-w-[800px]">
                        <thead class="bg-slate-700 text-white border-b">
                            <tr>
                                <th class="p-4 font-medium border-r border-slate-600">賣出價格</th>
                                <th class="p-4 font-medium border-r border-slate-600">損益金額</th>
                                <th class="p-4 font-medium border-r border-slate-600">報酬率</th>
                                <th class="p-4 font-medium border-r border-slate-600">買入手續</th>
                                <th class="p-4 font-medium border-r border-slate-600">賣出手續</th>
                                <th class="p-4 font-medium border-r border-slate-600">證交稅</th>
                                <th class="p-4 font-medium">投資成本</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                    <div id="empty-state" class="p-20 text-center text-gray-400">
                        請於左側輸入「買入價格」開始試算
                    </div>
                </div>
                <p class="mt-3 text-xs text-gray-500 text-left">※ 試算結果僅供參考，實際損益請以券商對帳單為準。</p>
                <p class="mt-8 text-xs text-gray-400 text-center">Copyright © 2026 Nick Hsu</p>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(() => {
                    console.log('PWA Service Worker 已啟動');
                });
            });
        }

        function loadSettings() {
            const savedDiscount = localStorage.getItem('stock_discount_v2'); 
            const savedMinFee = localStorage.getItem('stock_minFee');
            const savedTradeType = localStorage.getItem('stock_tradeType'); 
            if (savedDiscount !== null) document.getElementById('discount').value = savedDiscount;
            if (savedMinFee !== null) document.getElementById('minFee').value = savedMinFee;
            if (savedTradeType !== null) document.getElementById('tradeType').value = savedTradeType;
        }

        function saveSettings() {
            localStorage.setItem('stock_discount_v2', document.getElementById('discount').value);
            localStorage.setItem('stock_minFee', document.getElementById('minFee').value);
            localStorage.setItem('stock_tradeType', document.getElementById('tradeType').value); 
            const toast = document.getElementById('save-toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }

        function clearStorage() {
            if(confirm('恢復預設？')) {
                localStorage.clear();
                location.reload();
            }
        }

        function getTickSize(p, type) {
            const price = parseFloat(p);
            if (isNaN(price) || price <= 0) return 0.01;
            if (type === 'etf') {
                return price < 50 ? 0.01 : 0.05;
            } else {
                if (price < 10) return 0.01;
                if (price < 50) return 0.05;
                if (price < 100) return 0.1;
                if (price < 500) return 0.5;
                if (price < 1000) return 1.0;
                return 5.0;
            }
        }

        function updateInputStep() {
            const bInput = document.getElementById('buyPrice');
            const tInput = document.getElementById('targetSellPrice');
            const type = document.getElementById('tradeType').value;
            const bTick = getTickSize(bInput.value || 0, type);
            const tTick = getTickSize(tInput.value || 0, type);
            bInput.step = bTick;
            tInput.step = tTick;
        }

        function calculate() {
            updateInputStep();
            const buyPrice = parseFloat(document.getElementById('buyPrice').value);
            const targetSellPrice = parseFloat(document.getElementById('targetSellPrice').value);
            const shares = parseInt(document.getElementById('buyShares').value);
            const discountValue = parseFloat(document.getElementById('discount').value);
            const discountFactor = discountValue * 0.1; 
            const minFee = parseInt(document.getElementById('minFee').value);
            const feeMethod = document.getElementById('feeMethod').value;
            const tradeType = document.getElementById('tradeType').value; 
            const emptyState = document.getElementById('empty-state');
            const tableBody = document.getElementById('tableBody');

            if(!buyPrice || isNaN(buyPrice)) {
                emptyState.style.display = 'block';
                tableBody.innerHTML = '';
                return;
            } else {
                emptyState.style.display = 'none';
            }

            let taxRate = 0.003;
            if (tradeType === 'dayTrade') taxRate = 0.0015;
            if (tradeType === 'etf') taxRate = 0.001;

            function processFee(amount) {
                const rawFee = amount * 0.001425 * discountFactor;
                let finalFee = (feeMethod === 'floor') ? Math.floor(rawFee) : Math.round(rawFee);
                return Math.max(minFee, finalFee);
            }

            const buyRaw = buyPrice * shares;
            const buyFee = processFee(buyRaw);
            const totalInvestmentBase = buyRaw + buyFee;
            tableBody.innerHTML = '';

            function createRow(sPrice, customClass = "") {
                if (isNaN(sPrice) || sPrice <= 0) return "";
                const sAmount = sPrice * shares;
                const sFee = processFee(sAmount);
                const sTax = Math.floor(sAmount * taxRate); 
                const profit = (sAmount - sFee - sTax) - totalInvestmentBase;
                const roi = (profit / totalInvestmentBase) * 100;
                const colorClass = profit >= 0 ? 'profit-red' : 'loss-green';
                
                return `
                    <tr class="${customClass} hover:bg-gray-50 transition">
                        <td class="p-4 font-mono font-bold">${sPrice.toFixed(2)}</td>
                        <td class="p-4 ${colorClass}">${profit >= 0 ? '+' : ''}${Math.round(profit).toLocaleString()}</td>
                        <td class="p-4 ${colorClass}">${roi.toFixed(2)}%</td>
                        <td class="p-4 text-gray-400 text-xs">${buyFee}</td>
                        <td class="p-4 text-gray-400 text-xs">${sFee}</td>
                        <td class="p-4 text-gray-400 text-xs">${sTax.toLocaleString()}</td>
                        <td class="p-4 font-semibold text-slate-300 text-xs">${Math.round(totalInvestmentBase).toLocaleString()}</td>
                    </tr>
                `;
            }

            if (!isNaN(targetSellPrice) && targetSellPrice > 0) tableBody.innerHTML += createRow(targetSellPrice, "bg-orange-50");
            
            for (let i = -5; i <= 5; i++) {
                let currentPrice = buyPrice;
                let steps = Math.abs(i);
                let direction = i > 0 ? 1 : -1;
                
                for (let s = 0; s < steps; s++) {
                    if (direction === -1) {
                        currentPrice -= getTickSize(currentPrice - 0.0001, tradeType);
                    } else {
                        currentPrice += getTickSize(currentPrice, tradeType);
                    }
                }
                currentPrice = Math.round(currentPrice * 100) / 100;
                tableBody.innerHTML += createRow(currentPrice, (i === 0) ? "bg-yellow-100" : "");
            }
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
        document.getElementById('discount').addEventListener('change', saveSettings);
        document.getElementById('minFee').addEventListener('change', saveSettings);
        document.getElementById('tradeType').addEventListener('change', saveSettings); 
        window.onload = () => { loadSettings(); calculate(); };
    </script>
</body>
</html>
