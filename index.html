<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股交易損益試算器</title>
    
    <link rel="manifest" href="manifest.json?v=20260316">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        function applyTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
    </script>
    <style>
        .profit-red { color: #d63939; font-weight: bold; }
        .loss-green { color: #2d8a3c; font-weight: bold; }
        .dark .profit-red { color: #ff6b6b; }
        .dark .loss-green { color: #51cf66; }
        .table-container { overflow-x: auto; }
        #save-toast { transition: opacity 0.5s; opacity: 0; pointer-events: none; }
        #pwa-banner { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(-20px); opacity: 0; display: none; }
        #pwa-banner.show { display: flex; transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-slate-900 p-4 md:p-8 text-slate-700 dark:text-slate-300 transition-colors duration-300">

    <div class="max-w-7xl mx-auto">
        <div id="pwa-banner" class="bg-[#fef3c7] dark:bg-amber-900/30 border border-[#fde68a] dark:border-amber-700/50 p-3 mb-4 rounded-lg justify-between items-center shadow-sm">
            <div class="flex items-center gap-2">
                <span class="text-[#92400e] dark:text-amber-200 text-sm md:text-base">💡 加入主畫面後，即可作為 App 使用。</span>
            </div>
            <button onclick="closePwaBanner()" class="text-[#b45309] dark:text-amber-400 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <header class="bg-slate-800 dark:bg-slate-950 text-white p-4 rounded-lg shadow-md mb-6 flex justify-between items-center">
            <h1 class="text-xl font-bold">📊 股票交易試算器</h1>
            <div class="flex items-center gap-4">
                <span id="save-toast" class="text-xs bg-green-500 text-white px-2 py-1 rounded">設定已自動儲存</span>
                <button type="button" onclick="toggleDarkMode()" class="p-2 rounded-full border border-slate-600">
                    <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"></svg>
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6">
            <div class="w-full lg:w-80 flex-shrink-0">
                <div class="bg-white dark:bg-slate-800 p-6 shadow-md rounded-xl border-t-4 border-blue-500">
                    <h2 class="font-bold mb-6 border-l-4 border-blue-500 pl-2 text-lg text-slate-700 dark:text-slate-200">交易參數</h2>
                    <div class="space-y-5">
                        <div>
                            <label class="text-xs font-bold text-gray-500">交易類別</label>
                            <select id="tradeType" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                                <option value="stock">股票</option>
                                <option value="dayTrade">股票當沖</option>
                                <option value="etf">ETF</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500">買入價格 (元)</label>
                            <input type="number" id="buyPrice" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-orange-500">自定義賣出價 (元)</label>
                            <input type="number" id="targetSellPrice" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500">交易股數 (股)</label>
                            <input type="number" id="buyShares" value="1000" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400">手續費折扣</label>
                                <input type="number" id="discount" value="6" step="0.1" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400">最低收費</label>
                                <input type="number" id="minFee" value="20" class="w-full border p-2 rounded mt-1 dark:bg-slate-700 dark:text-white">
                            </div>
                        </div>
                        <div class="pt-4 border-t text-center">
                            <button onclick="clearStorage()" class="text-xs text-gray-400 hover:text-red-500">恢復預設值</button>
                            <div id="version-display" class="mt-2 text-[10px] font-mono text-gray-400">
                                System Version: v20260316.09
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex-grow">
                <div class="bg-white dark:bg-slate-800 shadow-md rounded-xl table-container">
                    <table class="w-full text-center text-sm min-w-[800px]">
                        <thead class="bg-slate-700 text-white">
                            <tr>
                                <th class="p-4 border-r border-slate-600">賣出價格</th>
                                <th class="p-4 border-r border-slate-600">損益金額</th>
                                <th class="p-4 border-r border-slate-600">報酬率</th>
                                <th class="p-4 border-r border-slate-600">買入手續</th>
                                <th class="p-4 border-r border-slate-600">賣出手續</th>
                                <th class="p-4 border-r border-slate-600">證交稅</th>
                                <th class="p-4">投資成本</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-100 dark:divide-slate-700 text-slate-700 dark:text-slate-300"></tbody>
                    </table>
                    <div id="empty-state" class="p-20 text-center text-gray-400">請輸入「買入價格」開始試算</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 基本計算邏輯 (簡化) ---
        function updateIcon() {
            const icon = document.getElementById('theme-icon');
            if (document.documentElement.classList.contains('dark')) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />';
                icon.setAttribute('class', 'h-6 w-6 text-yellow-400');
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />';
                icon.setAttribute('class', 'h-6 w-6 text-blue-100');
            }
        }
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            updateIcon();
        }
        function getTickSize(p, type) {
            const price = parseFloat(p);
            if (type === 'etf') return price < 49.9999 ? 0.01 : 0.05;
            if (price < 9.9999) return 0.01; if (price < 49.9999) return 0.05; 
            if (price < 99.9999) return 0.1; if (price < 499.9999) return 0.5; 
            if (price < 999.9999) return 1.0; return 5.0;
        }
        function calculate() {
            const buyPrice = parseFloat(document.getElementById('buyPrice').value);
            const targetSellPrice = parseFloat(document.getElementById('targetSellPrice').value);
            const shares = parseInt(document.getElementById('buyShares').value);
            const discount = parseFloat(document.getElementById('discount').value) * 0.1;
            const minFee = parseInt(document.getElementById('minFee').value);
            const tradeType = document.getElementById('tradeType').value;
            const tableBody = document.getElementById('tableBody');
            if(!buyPrice) { document.getElementById('empty-state').style.display = 'block'; tableBody.innerHTML = ''; return; }
            document.getElementById('empty-state').style.display = 'none';
            let taxRate = (tradeType === 'dayTrade') ? 0.0015 : (tradeType === 'etf' ? 0.001 : 0.003);
            const buyFee = Math.max(minFee, Math.floor(buyPrice * shares * 0.001425 * discount));
            const totalCost = (buyPrice * shares) + buyFee;
            tableBody.innerHTML = '';
            const createRow = (sPrice, cls = "") => {
                if (!sPrice || sPrice <= 0) return "";
                const sFee = Math.max(minFee, Math.floor(sPrice * shares * 0.001425 * discount));
                const sTax = Math.floor(sPrice * shares * taxRate);
                const profit = (sPrice * shares - sFee - sTax) - totalCost;
                const roi = (profit / totalCost) * 100;
                return `<tr class="${cls} hover:bg-gray-50 dark:hover:bg-slate-700">
                    <td class="p-4 font-mono font-bold">${sPrice.toFixed(2)}</td>
                    <td class="p-4 ${profit >= 0 ? 'profit-red' : 'loss-green'}">${Math.round(profit).toLocaleString()}</td>
                    <td class="p-4 ${profit >= 0 ? 'profit-red' : 'loss-green'}">${roi.toFixed(2)}%</td>
                    <td class="p-4 text-xs text-gray-400">${buyFee}</td>
                    <td class="p-4 text-xs text-gray-400">${sFee}</td>
                    <td class="p-4 text-xs text-gray-400">${sTax.toLocaleString()}</td>
                    <td class="p-4 text-xs text-gray-400">${Math.round(totalCost).toLocaleString()}</td>
                </tr>`;
            };
            if (targetSellPrice > 0) tableBody.innerHTML += createRow(targetSellPrice, "bg-orange-50 dark:bg-orange-900/20");
            for (let i = -5; i <= 5; i++) {
                let p = buyPrice;
                for (let s = 0; s < Math.abs(i); s++) { p += (i > 0) ? getTickSize(p, tradeType) : -getTickSize(p - 0.0001, tradeType); }
                tableBody.innerHTML += createRow(Math.round(p * 100) / 100, i === 0 ? "bg-yellow-100 dark:bg-yellow-900/30" : "");
            }
        }
        function saveSettings() {
            localStorage.setItem('stock_discount', document.getElementById('discount').value);
            localStorage.setItem('stock_minFee', document.getElementById('minFee').value);
            const t = document.getElementById('save-toast'); t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2000);
        }
        function clearStorage() { if(confirm('重設所有設定？')) { localStorage.clear(); location.reload(); } }

        // --- 核心：絕對彈窗註冊邏輯 ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // 每次載入都加時間戳，強制繞過伺服器與瀏覽器對 sw.js 的緩存
                const swUrl = `sw.js?v=${Date.now()}`;

                navigator.serviceWorker.register(swUrl).then(reg => {
                    // 強制觸發一次更新檢查
                    reg.update();

                    // 核心監聽：只要發現正在安裝新版
                    reg.onupdatefound = () => {
                        const newWorker = reg.installing;
                        newWorker.onstatechange = () => {
                            // 下載完成 (installed)
                            if (newWorker.state === 'installed') {
                                // 只要核心有變動，直接跳彈窗
                                if (confirm('📊 發現系統更新！\n\n是否立即重新載入以套用最新版本？')) {
                                    newWorker.postMessage('SKIP_WAITING');
                                }
                            }
                        };
                    };
                });

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        window.location.reload();
                        refreshing = true;
                    }
                });
            });
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
        document.getElementById('discount').addEventListener('change', saveSettings);
        document.getElementById('minFee').addEventListener('change', saveSettings);
        window.onload = () => { 
            document.getElementById('discount').value = localStorage.getItem('stock_discount') || 6;
            document.getElementById('minFee').value = localStorage.getItem('stock_minFee') || 20;
            calculate(); updateIcon(); 
        };
    </script>
</body>
</html>
